<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="assets/icon.png">
<link rel="apple-touch-icon" href="assets/favicon.png">

<link rel="shortcut icon" href="assets/favicon.png">

<title>Yamaha Fazzio Racing Pro Ultimate</title>

<link rel="stylesheet" href="style.css">

</head>

<body>
<img src="assets/bisma.png" alt="Yamaha Bisma">


<div id="hud">

<div>
Score
<br>
<span id="score">0</span>
</div>

<div>
Level
<br>
<span id="level">1</span>
</div>

<div>
Speed
<br>
<span id="speed">6</span>
</div>

<div>
Highscore
<br>
<span id="highscore">0</span>
</div>

</div>


<div id="game">

<!-- <div class="road-line line1"></div>
<div class="road-line line2"></div> -->

<div id="rain"></div>

<div id="player"></div>

</div>

<div id="controls">

    <button id="leftBtn">⬅</button>

    <button id="rightBtn">➡</button>

</div>

<div id="gameOverPopup">

    <div class="popup-box">

        <h2>GAME OVER</h2>

        <p>Score : <span id="finalScore">0</span></p>

        <p>Level : <span id="finalLevel">1</span></p>

        <p>Highscore : <span id="finalHigh">0</span></p>

        <button id="restartBtn">

            Restart Game

        </button>

    </div>

</div>


<script src="game.js"></script>

<footer>
    <center>
        <a href="https://www.linkedin.com/in/iwayanandika" target="_blank" style="color: grey; font-size: 12px; text-decoration: none;">
            <p>Developed by <span style="color: rgb(0, 183, 255); font-size: 12px;">Andika Pranayoga</span></p>
        </a>
    </center>
</footer>
</body>

</html>
